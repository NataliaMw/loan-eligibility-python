name: Lint on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.py'

jobs:
  pylint:
    name: Pylint - zero violations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pylint

      - name: Run Pylint
        run: pylint src/loan/eligibility.py --rcfile=.pylintrc --fail-under=10
